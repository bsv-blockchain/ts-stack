codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 1%
        paths:
          - "packages/sdk/src/"

    patch:
      default:
        target: 80%
        threshold: 1%

flags:
  sdk:
    paths:
      - "packages/sdk/src/"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: no

ignore:
  - "**/*.test.ts"
  - "**/*.vectors.ts"
  - "**/test/**"
  - "**/tests/**"
  - "**/__tests__/**"
  - "**/fixtures/**"
  - "**/benchmarks/**"
  - "**/coverage/**"
  - "**/dist/**"
  - "**/docs/**"
  - "**/scripts/**"
