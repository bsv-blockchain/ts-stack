<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Package Relationships</title>
  <desc id="desc">Dark technical diagram showing inward package dependency flow. Application packages for overlays, messaging, and middleware depend on the wallet layer. The wallet layer depends on infrastructure and the core SDK. Helper packages sit beside the application layer and have dashed dependencies into wallet and SDK packages.</desc>
  <style>
    .panel { fill: #101624; stroke: #2a3a52; stroke-width: 1.5; }
    .grid-line { stroke: rgba(148, 163, 184, 0.08); stroke-width: 1; }
    .layer-app { fill: rgba(37, 99, 235, 0.13); stroke: #60a5fa; stroke-width: 1.75; }
    .layer-wallet { fill: rgba(8, 145, 178, 0.15); stroke: #22d3ee; stroke-width: 1.75; }
    .layer-infra { fill: rgba(99, 102, 241, 0.12); stroke: #818cf8; stroke-width: 1.5; }
    .layer-core { fill: rgba(180, 83, 9, 0.17); stroke: #f59e0b; stroke-width: 1.75; }
    .module { fill: rgba(15, 23, 42, 0.9); stroke: #334155; stroke-width: 1.35; }
    .module-cyan { fill: rgba(8, 47, 73, 0.85); stroke: #22d3ee; stroke-width: 1.55; }
    .module-amber { fill: rgba(69, 26, 3, 0.82); stroke: #f59e0b; stroke-width: 1.55; }
    .module-helper { fill: rgba(30, 41, 59, 0.88); stroke: #94a3b8; stroke-width: 1.35; stroke-dasharray: 7 5; }
    .title { font: 700 26px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #f8fafc; }
    .subtitle { font: 14px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #94a3b8; }
    .layer-label { font: 700 16px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #e2e8f0; letter-spacing: 0.02em; }
    .node-title { font: 700 17px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #f8fafc; }
    .pkg { font: 14px ui-monospace, "SF Mono", Menlo, monospace; fill: #cbd5e1; }
    .pkg-cyan { font: 14px ui-monospace, "SF Mono", Menlo, monospace; fill: #e0f2fe; }
    .pkg-amber { font: 15px ui-monospace, "SF Mono", Menlo, monospace; fill: #ffd28a; }
    .tag { font: 12px ui-monospace, "SF Mono", Menlo, monospace; fill: #94a3b8; letter-spacing: 0.04em; }
    .legend { font: 12px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #94a3b8; }
    .edge { stroke: #22d3ee; stroke-width: 2.1; fill: none; marker-end: url(#arrow-cyan); }
    .edge-muted { stroke: #64748b; stroke-width: 1.9; fill: none; marker-end: url(#arrow-muted); }
    .edge-dashed { stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow-muted); }
  </style>
  <defs>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="35" y="30" width="1370" height="760" rx="12" class="panel"/>
  <path d="M95 135 H1345 M95 205 H1345 M95 275 H1345 M95 345 H1345 M95 415 H1345 M95 485 H1345 M95 555 H1345 M95 625 H1345 M95 695 H1345" class="grid-line"/>
  <path d="M165 105 V735 M305 105 V735 M445 105 V735 M585 105 V735 M725 105 V735 M865 105 V735 M1005 105 V735 M1145 105 V735 M1285 105 V735" class="grid-line"/>

  <text x="70" y="78" class="title">Package dependency flow</text>
  <text x="70" y="106" class="subtitle">Arrows point inward toward lower-level packages. Dashed lines show cross-cutting helper dependencies.</text>

  <rect x="96" y="145" width="1038" height="190" rx="12" class="layer-app"/>
  <text x="615" y="183" text-anchor="middle" class="layer-label">Application Layer</text>

  <rect x="145" y="225" width="260" height="70" rx="8" class="module"/>
  <text x="275" y="253" text-anchor="middle" class="node-title">Overlays</text>
  <text x="275" y="277" text-anchor="middle" class="pkg">@bsv/overlay</text>

  <rect x="452" y="208" width="290" height="104" rx="8" class="module"/>
  <text x="597" y="245" text-anchor="middle" class="node-title">Messaging</text>
  <text x="597" y="270" text-anchor="middle" class="pkg">@bsv/message-box-</text>
  <text x="597" y="291" text-anchor="middle" class="pkg">client</text>

  <rect x="788" y="208" width="290" height="104" rx="8" class="module"/>
  <text x="933" y="245" text-anchor="middle" class="node-title">Middleware</text>
  <text x="933" y="270" text-anchor="middle" class="pkg">@bsv/auth-express-</text>
  <text x="933" y="291" text-anchor="middle" class="pkg">middleware</text>

  <rect x="1168" y="225" width="210" height="70" rx="8" class="module-helper"/>
  <text x="1273" y="253" text-anchor="middle" class="node-title">Helpers</text>
  <text x="1273" y="277" text-anchor="middle" class="pkg">@bsv/simple</text>

  <rect x="182" y="385" width="986" height="150" rx="12" class="layer-wallet"/>
  <text x="675" y="423" text-anchor="middle" class="layer-label">Wallet Layer</text>

  <rect x="540" y="444" width="270" height="72" rx="8" class="module-cyan"/>
  <text x="675" y="473" text-anchor="middle" class="node-title">Wallet</text>
  <text x="675" y="497" text-anchor="middle" class="pkg-cyan">@bsv/wallet-toolbox</text>

  <rect x="545" y="585" width="340" height="110" rx="12" class="layer-infra"/>
  <text x="715" y="623" text-anchor="middle" class="layer-label">Infrastructure Layer</text>

  <rect x="592" y="642" width="246" height="52" rx="8" class="module"/>
  <text x="715" y="663" text-anchor="middle" class="node-title">Network</text>
  <text x="715" y="685" text-anchor="middle" class="pkg">@bsv/teranode-listener</text>

  <rect x="455" y="708" width="640" height="82" rx="12" class="layer-core"/>
  <text x="775" y="735" text-anchor="middle" class="layer-label">Core Layer</text>

  <rect x="625" y="747" width="260" height="43" rx="8" class="module-amber"/>
  <text x="755" y="774" text-anchor="middle" class="pkg-amber">@bsv/sdk</text>

  <path class="edge" d="M275 295 V345 C275 382 421 393 540 468"/>
  <path class="edge" d="M597 312 V392 C597 418 616 431 642 443"/>
  <path class="edge" d="M933 312 V392 C933 419 862 434 809 458"/>
  <path class="edge-muted" d="M710 516 C756 548 766 591 740 641"/>
  <path class="edge-muted" d="M650 516 C563 579 564 710 624 768"/>
  <path class="edge-muted" d="M715 694 V746"/>
  <path class="edge-dashed" d="M1238 295 C1198 343 1194 373 1157 396 C1093 435 933 445 811 470"/>
  <path class="edge-dashed" d="M1312 295 C1376 406 1376 652 1302 690 C1225 728 1028 742 886 768"/>

  <line x1="1040" y1="104" x2="1082" y2="104" class="edge"/>
  <text x="1095" y="109" class="legend">package dependency</text>
  <line x1="1228" y1="104" x2="1270" y2="104" class="edge-dashed"/>
  <text x="1284" y="109" class="legend">helper path</text>
</svg>
