<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
  <title id="title">Package Relationships</title>
  <desc id="desc">Inward dependency flow across ts-stack packages. Application packages such as overlays, messaging, and middleware depend on the wallet layer. The wallet layer depends on infrastructure and the core SDK. Helpers sit beside the application layer and can depend on wallet or SDK packages.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa0a6"/>
    </marker>
    <style>
      .canvas { fill: #f7f7f6; }
      .layer { fill: #fbfbfa; stroke: #d8d8d8; stroke-width: 1; }
      .node { fill: #ffffff; stroke: #d4d4d4; stroke-width: 1; }
      .edge { fill: none; stroke: #9aa0a6; stroke-width: 1.4; marker-end: url(#arrow); }
      .edge-dashed { fill: none; stroke: #9aa0a6; stroke-width: 1.4; stroke-dasharray: 3.5 5; marker-end: url(#arrow); }
      .layer-label { font: 500 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #44484c; }
      .node-title { font: 500 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #30343a; }
      .node-subtitle { font: 400 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #30343a; }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="1180" height="660"/>

  <!-- Application layer -->
  <rect class="layer" x="24" y="22" width="870" height="158"/>
  <text class="layer-label" x="459" y="43" text-anchor="middle">Application Layer</text>

  <rect class="node" x="58" y="70" width="220" height="58"/>
  <text class="node-title" x="168" y="96" text-anchor="middle">Overlays</text>
  <text class="node-subtitle" x="168" y="116" text-anchor="middle">(@bsv/overlay)</text>

  <rect class="node" x="326" y="46" width="246" height="106"/>
  <text class="node-title" x="449" y="80" text-anchor="middle">Messaging</text>
  <text class="node-subtitle" x="449" y="103" text-anchor="middle">(@bsv/message-box-</text>
  <text class="node-subtitle" x="449" y="124" text-anchor="middle">client)</text>

  <rect class="node" x="620" y="58" width="246" height="82"/>
  <text class="node-title" x="743" y="91" text-anchor="middle">Middleware</text>
  <text class="node-subtitle" x="743" y="114" text-anchor="middle">(@bsv/auth-express-</text>
  <text class="node-subtitle" x="743" y="135" text-anchor="middle">middleware)</text>

  <!-- Helpers sit beside the application layer because they are used by apps and packages. -->
  <rect class="node" x="926" y="70" width="210" height="58"/>
  <text class="node-title" x="1031" y="96" text-anchor="middle">Helpers</text>
  <text class="node-subtitle" x="1031" y="116" text-anchor="middle">(@bsv/simple)</text>

  <!-- Wallet layer -->
  <rect class="layer" x="70" y="228" width="940" height="126"/>
  <text class="layer-label" x="540" y="250" text-anchor="middle">Wallet Layer</text>

  <rect class="node" x="486" y="254" width="246" height="82"/>
  <text class="node-title" x="609" y="287" text-anchor="middle">Wallet</text>
  <text class="node-subtitle" x="609" y="310" text-anchor="middle">(@bsv/wallet-</text>
  <text class="node-subtitle" x="609" y="331" text-anchor="middle">toolbox)</text>

  <!-- Infrastructure layer -->
  <rect class="layer" x="540" y="406" width="312" height="132"/>
  <text class="layer-label" x="696" y="429" text-anchor="middle">Infrastructure Layer</text>

  <rect class="node" x="574" y="448" width="244" height="80"/>
  <text class="node-title" x="696" y="481" text-anchor="middle">Network</text>
  <text class="node-subtitle" x="696" y="504" text-anchor="middle">(@bsv/teranode-</text>
  <text class="node-subtitle" x="696" y="522" text-anchor="middle">listener)</text>

  <!-- Core layer -->
  <rect class="layer" x="484" y="560" width="604" height="82"/>
  <text class="layer-label" x="786" y="582" text-anchor="middle">Core Layer</text>

  <rect class="node" x="612" y="594" width="166" height="48"/>
  <text class="node-title" x="695" y="624" text-anchor="middle">SDK (@bsv/sdk)</text>

  <!-- Inward dependency flow -->
  <path class="edge" d="M 168 128 L 168 204 C 168 224 190 231 218 237 L 486 290"/>
  <path class="edge" d="M 449 152 L 449 203 C 449 226 470 239 503 258"/>
  <path class="edge" d="M 743 140 L 743 203 C 743 226 723 240 689 258"/>
  <path class="edge" d="M 660 336 C 692 363 696 392 696 446"/>
  <path class="edge" d="M 555 336 C 520 365 520 548 610 618"/>
  <path class="edge" d="M 696 528 L 696 592"/>

  <!-- Helper packages are intentionally cross-cutting, so use dashed dependency lines. -->
  <path class="edge-dashed" d="M 1015 128 C 980 162 985 198 970 218 C 940 252 822 267 733 282"/>
  <path class="edge-dashed" d="M 1045 128 C 1085 190 1085 316 1084 534 C 1084 560 929 585 778 618"/>
</svg>
