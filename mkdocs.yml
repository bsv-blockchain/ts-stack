    - BRC-29 Peer Payment: specs/brc-29-peer-payment.md
    - BRC-121 / HTTP 402: specs/brc-121-402.md
    - ARC Broadcast: specs/arc-broadcast.md
    - Merkle Service: specs/merkle-service.md
