    - Build a wallet-aware app: guides/wallet-aware-app.md
    - Run an overlay node: guides/run-overlay-node.md
    - Peer-to-peer messaging: guides/peer-to-peer-messaging.md
    - HTTP 402 payments: guides/http-402-payments.md
  - Reference:
