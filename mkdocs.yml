site_name: ts-stack
site_description: BSV TypeScript monorepo — production packages for building payment, identity, and data apps on BSV
site_url: https://bsv-blockchain.github.io/ts-stack
repo_url: https://github.com/bsv-blockchain/ts-stack
repo_name: bsv-blockchain/ts-stack
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    logo: material/code-braces
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

hooks:
  - docs/hooks.py

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Get Started:
    - get-started/index.md
    - Install: get-started/install.md
    - Choose your stack: get-started/choose-your-stack.md
    - Key concepts: get-started/concepts.md
  - Architecture:
    - architecture/index.md
    - Stack Layers: architecture/layers.md
    - BEEF (BRC-62): architecture/beef.md
    - BRC-100 Wallet Interface: architecture/brc-100.md
    - Identity & Auth: architecture/identity.md
    - Conformance Pipeline: architecture/conformance.md
  - Packages:
    - packages/index.md
    - SDK:
      - packages/sdk/index.md
      - "@bsv/sdk": packages/sdk/bsv-sdk.md
    - Wallet:
      - packages/wallet/index.md
      - "@bsv/wallet-toolbox": packages/wallet/wallet-toolbox.md
      - "@bsv/btms": packages/wallet/btms.md
      - "@bsv/btms-permission-module": packages/wallet/btms-permission-module.md
      - "@bsv/wallet-relay": packages/wallet/wallet-relay.md
      - "@bsv/wallet-toolbox-examples": packages/wallet/wallet-toolbox-examples.md
    - Network:
      - packages/network/index.md
      - "@bsv/teranode-listener": packages/network/teranode-listener.md
    - Overlays:
      - packages/overlays/index.md
      - "@bsv/overlay": packages/overlays/overlay.md
      - "@bsv/overlay-express": packages/overlays/overlay-express.md
      - "@bsv/overlay-topics": packages/overlays/overlay-topics.md
      - "@bsv/overlay-discovery-services": packages/overlays/overlay-discovery-services.md
      - "@bsv/gasp": packages/overlays/gasp.md
      - "@bsv/btms-backend": packages/overlays/btms-backend.md
    - Messaging:
      - packages/messaging/index.md
      - "@bsv/message-box-client": packages/messaging/message-box-client.md
      - "@bsv/authsocket": packages/messaging/authsocket.md
      - "@bsv/authsocket-client": packages/messaging/authsocket-client.md
      - "@bsv/paymail": packages/messaging/paymail.md
    - Middleware:
      - packages/middleware/index.md
      - "@bsv/auth-express-middleware": packages/middleware/auth-express-middleware.md
      - "@bsv/payment-express-middleware": packages/middleware/payment-express-middleware.md
      - "@bsv/402-pay": packages/middleware/402-pay.md
    - Helpers:
      - packages/helpers/index.md
      - "@bsv/simple": packages/helpers/simple.md
      - "@bsv/templates": packages/helpers/templates.md
      - "@bsv/did-client": packages/helpers/did-client.md
      - "@bsv/wallet-helper": packages/helpers/wallet-helper.md
      - "@bsv/amountinator": packages/helpers/amountinator.md
      - "@bsv/fund-wallet": packages/helpers/fund-wallet.md
  - Infrastructure:
    - infrastructure/index.md
    - message-box-server: infrastructure/message-box-server.md
    - overlay-server: infrastructure/overlay-server.md
    - uhrp-server-basic: infrastructure/uhrp-server-basic.md
