name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check cross-package version references
        run: node scripts/check-versions.mjs

      - name: Build all packages
        # Exclude: example-paymail (example package, not production)
        run: pnpm -r --filter '!example-paymail' run build

      - name: Lint all packages
        continue-on-error: true
        run: pnpm -r run lint --if-present

      - name: Test all packages
        # Exclude: example-paymail (example package, not production)
        run: pnpm -r --filter '!example-paymail' run test

  conformance:
    name: Conformance Vectors
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --ignore-scripts

      - name: Validate conformance vectors (TS)
        run: cd conformance/runner && node src/runner.js --validate-only

      - name: Run conformance vectors (TS)
        run: cd conformance/runner && node src/runner.js --report ../reports/ts-report.xml

      - name: Upload conformance reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-report
          path: conformance/reports/
          if-no-files-found: ignore

      # Published so downstream SDKs (go-sdk etc.) can fetch vectors in their own CI.
      # See conformance/GO_PLAN.md for migration status.
      - name: Publish conformance vectors
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: conformance-vectors
          path: conformance/vectors/
          retention-days: 90
