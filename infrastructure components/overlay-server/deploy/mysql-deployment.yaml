apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -o deploy/
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: mysql
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -o deploy/
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: mysql
    spec:
      automountServiceAccountToken: false
      containers:
        - env:
            - name: MYSQL_DATABASE
              value: appdb
            - name: MYSQL_PASSWORD
              value: apppass
            - name: MYSQL_ROOT_PASSWORD
              value: example
            - name: MYSQL_USER
              value: appuser
          image: mysql:8
          name: mysql
          ports:
            - containerPort: 3306
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
              ephemeral-storage: 1Gi
            limits:
              memory: 1Gi
              ephemeral-storage: 2Gi
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-data
      restartPolicy: Always
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data
