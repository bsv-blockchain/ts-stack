services:
  mongodb:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD}

  mysql:
    image: mysql:8
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  overlay-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: overlay-server
    depends_on:
      - mongodb
      - mysql
    ports:
      - "8080:8080"
    environment:
      MONGO_URL: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD}@mongodb:27017
      KNEX_URL: mysql://${MYSQL_USER:-appuser}:${MYSQL_PASSWORD:?set MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-appdb}
      SERVER_PRIVATE_KEY: ${SERVER_PRIVATE_KEY:?set SERVER_PRIVATE_KEY}
      WALLET_STORAGE_URL: https://store-us-1.bsvb.tech
      HOSTING_URL: https://your.overlay.network
      ARC_API_KEY: ${ARC_API_KEY:-}
      NETWORK: main
      NODE_NAME: your-overlay-node
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN}
      GASP_ENABLED: "false"
    command: ["npm", "run", "start"]

  janitor:
    image: alpine:latest
    container_name: janitor
    depends_on:
      - overlay-server
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl
        echo '0 0 * * * curl -X POST -H "Authorization: Bearer ${ADMIN_TOKEN}" http://app:8080/admin/janitor' > /etc/crontabs/root
        crond -f -l 2

volumes:
  mongo_data:
  mysql_data:
