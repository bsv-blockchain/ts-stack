NODE_ENV: "production"
BSV_NETWORK: "main" # main | test
ENABLE_NGINX: "true"
HTTP_PORT: "8080"
SERVER_PRIVATE_KEY: "<PRIVATE_KEY_HEX_STRING>"
# Knex client. Options: "mysql2" (default), "pg". May also be set inline as
# `"client": "pg"` inside the KNEX_DB_CONNECTION JSON.
KNEX_DB_CLIENT: "mysql2"
# Connection JSON, parsed at boot. MySQL example (port 3306). For Postgres,
# set KNEX_DB_CLIENT=pg and use port 5432:
#   {"host":"<HOST>","user":"wallet_admin","password":"<PASS>","database":"wallet_storage","port":5432}
KNEX_DB_CONNECTION: '{"host": "<HOST>", "user": "wallet_admin", "password": "<ANOTHER_SECURE_PASS>", "database": "wallet_storage", "port": 3306}'
# Pool sizing. Defaults are tuned for a single Cloud Run revision with 1–2
# vCPU. Increase KNEX_POOL_MAX when scaling vertically or running behind a
# connection-pooling proxy (PgBouncer / ProxySQL).
KNEX_POOL_MAX: "32"
KNEX_POOL_MIN: "2"